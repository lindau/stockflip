<!DOCTYPE html>
<html lang="sv"><head>
<meta charset="UTF-8">
<title>StockFlip — Android UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; background: #E9EEF3; color: var(--np-text-primary); font-family: var(--np-font-sans); min-height: 100vh; }
  .canvas { padding: 56px 40px 80px; }
  header { max-width: 1800px; margin: 0 auto 40px; }
  .eyebrow { font: 500 11px/1 var(--np-font-sans); letter-spacing: 0.6px; text-transform: uppercase; color: var(--np-text-tertiary); margin: 0 0 8px; }
  h1 { font-family: var(--np-font-display); font-weight: 400; font-size: 44px; line-height: 1.08; margin: 0 0 8px; }
  .sub { font: 400 15px/1.5 var(--np-font-sans); color: var(--np-text-secondary); max-width: 720px; margin: 0; }
  .strip { max-width: 1800px; margin: 0 auto; display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .cell .label { font: 500 11px/1 var(--np-font-sans); letter-spacing: 0.6px; text-transform: uppercase; color: var(--np-text-tertiary); }
  .cell .title { font: 600 14px/1.2 var(--np-font-sans); color: var(--np-text-primary); }
  .cap { text-align: center; }
  #root { min-height: 100px; }
</style>
</head>
<body>
  <header class="canvas" style="padding-bottom: 0">
    <p class="eyebrow">Design system · UI kit · Android</p>
    <h1>StockFlip screens</h1>
    <p class="sub">Four high-fidelity mocks rendered with the Nordisk Precision tokens — Stocks list, Pairs list, Alerts with triggered states, and the Ericsson B detail view. Device frames approximate a Pixel 7 viewport at 390×844.</p>
  </header>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../assets/icons.js"></script>
  <script type="text/babel" src="device.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel">
    const App = () => (
      <div className="canvas" style={{paddingTop: 0}}>
        <div className="strip">
          <div className="cell">
            <window.SFDevice title="Aktier" activeTab={0} showFab>
              <window.StocksScreen />
            </window.SFDevice>
            <div className="cap"><div className="title">Aktier — Stocks list</div><div className="label">Grouped list · hairline borders</div></div>
          </div>
          <div className="cell">
            <window.SFDevice title="Par" activeTab={1} showFab>
              <window.PairsScreen />
            </window.SFDevice>
            <div className="cap"><div className="title">Par — Pair ratios</div><div className="label">Independent cards · 8 dp gap</div></div>
          </div>
          <div className="cell">
            <window.SFDevice title="Bevakningar" activeTab={2} showFab>
              <window.AlertsScreen />
            </window.SFDevice>
            <div className="cap"><div className="title">Bevakningar — Alerts</div><div className="label">Triggered amber + status stripe</div></div>
          </div>
          <div className="cell">
            <window.SFDevice title="Ericsson B" activeTab={0}>
              <window.DetailScreen />
            </window.SFDevice>
            <div className="cap"><div className="title">Detalj — Stock detail</div><div className="label">Hero · stat triplet · range · watches</div></div>
          </div>
        </div>
      </div>
    );
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body></html>
